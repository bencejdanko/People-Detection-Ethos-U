name: Unit tests

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v4

      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install dependencies
        # The onnx extra keeps the ONNX-dependent unit tests (raw export
        # contract, picodet/classification round-trips) from silently
        # skipping in this gate — they importorskip onnx/onnxruntime.
        run: uv pip install --no-sources --torch-backend cpu --group dev -e ".[rfdetr,onnx]"

      - name: Run PR gate tests
        env:
          LIBREYOLO_PR_GATE: "1"
        run: uv run --no-sync pytest tests/unit -m "unit and not external_data and not network"
