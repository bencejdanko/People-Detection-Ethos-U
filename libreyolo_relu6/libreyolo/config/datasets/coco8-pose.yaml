# COCO8-pose dataset (8 keypoint-labeled images for pose smoke tests and overfit gates)
# Example usage: model.train(data="coco8-pose.yaml", task="pose", allow_download_scripts=True)

path: coco8-pose

train: images/train
val: images/val
test:

nc: 1
names:
  0: person

kpt_shape: [17, 3]
flip_idx: [0, 2, 1, 4, 3, 6, 5, 8, 7, 10, 9, 12, 11, 14, 13, 16, 15]
keypoints:
  - nose
  - left_eye
  - right_eye
  - left_ear
  - right_ear
  - left_shoulder
  - right_shoulder
  - left_elbow
  - right_elbow
  - left_wrist
  - right_wrist
  - left_hip
  - right_hip
  - left_knee
  - right_knee
  - left_ankle
  - right_ankle
skeleton:
  - [16, 14]
  - [14, 12]
  - [17, 15]
  - [15, 13]
  - [12, 13]
  - [6, 12]
  - [7, 13]
  - [6, 7]
  - [6, 8]
  - [7, 9]
  - [8, 10]
  - [9, 11]
  - [2, 3]
  - [1, 2]
  - [1, 3]
  - [2, 4]
  - [3, 5]
  - [4, 6]
  - [5, 7]
oks_sigmas: [0.026, 0.025, 0.025, 0.035, 0.035, 0.079, 0.079, 0.072, 0.072, 0.062, 0.062, 0.107, 0.107, 0.087, 0.087, 0.089, 0.089]

download: |
  import json
  from pathlib import Path
  from libreyolo.data.coco_pose import convert_coco_keypoints_json_to_yolo_pose
  from libreyolo.data.utils import download

  dir = Path(yaml["path"])
  download(["http://images.cocodataset.org/annotations/annotations_trainval2017.zip"], dir=dir)

  def materialize_split(split, dst_name):
      ann_path = dir / "annotations" / f"person_keypoints_{split}2017.json"
      with ann_path.open("r", encoding="utf-8") as fh:
          coco = json.load(fh)
      images = {int(img["id"]): img for img in coco["images"]}
      selected = []
      seen = set()
      for ann in coco["annotations"]:
          if int(ann.get("category_id", -1)) != 1:
              continue
          if int(ann.get("num_keypoints", 0)) <= 0:
              continue
          image_id = int(ann["image_id"])
          if image_id in seen:
              continue
          image = images.get(image_id)
          if not image:
              continue
          selected.append(image)
          seen.add(image_id)
          if len(selected) == 4:
              break
      image_dir = dir / "images" / dst_name
      urls = [
          f"http://images.cocodataset.org/{split}2017/{image['file_name']}"
          for image in selected
      ]
      download(urls, dir=image_dir, unzip=False, delete=False, threads=4)
      convert_coco_keypoints_json_to_yolo_pose(
          ann_path,
          image_dir,
          dir / "labels" / dst_name,
      )

  materialize_split("train", "train")
  materialize_split("val", "val")
