# COCO 2017 person keypoints dataset https://cocodataset.org
# Example usage: model.train(data="coco-pose.yaml", task="pose", allow_download_scripts=True)

path: coco-pose

train: images/train2017
val: images/val2017
test:

nc: 1
names:
  0: person

kpt_shape: [17, 3]
flip_idx: [0, 2, 1, 4, 3, 6, 5, 8, 7, 10, 9, 12, 11, 14, 13, 16, 15]
keypoints:
  - nose
  - left_eye
  - right_eye
  - left_ear
  - right_ear
  - left_shoulder
  - right_shoulder
  - left_elbow
  - right_elbow
  - left_wrist
  - right_wrist
  - left_hip
  - right_hip
  - left_knee
  - right_knee
  - left_ankle
  - right_ankle
skeleton:
  - [16, 14]
  - [14, 12]
  - [17, 15]
  - [15, 13]
  - [12, 13]
  - [6, 12]
  - [7, 13]
  - [6, 7]
  - [6, 8]
  - [7, 9]
  - [8, 10]
  - [9, 11]
  - [2, 3]
  - [1, 2]
  - [1, 3]
  - [2, 4]
  - [3, 5]
  - [4, 6]
  - [5, 7]
oks_sigmas: [0.026, 0.025, 0.025, 0.035, 0.035, 0.079, 0.079, 0.072, 0.072, 0.062, 0.062, 0.107, 0.107, 0.087, 0.087, 0.089, 0.089]

download: |
  from pathlib import Path
  from libreyolo.data.coco_pose import convert_coco_keypoints_json_to_yolo_pose
  from libreyolo.data.utils import download

  dir = Path(yaml["path"])
  download(["http://images.cocodataset.org/annotations/annotations_trainval2017.zip"], dir=dir)
  download(
      [
          "http://images.cocodataset.org/zips/train2017.zip",
          "http://images.cocodataset.org/zips/val2017.zip",
      ],
      dir=dir / "images",
      threads=2,
  )
  convert_coco_keypoints_json_to_yolo_pose(
      dir / "annotations" / "person_keypoints_train2017.json",
      dir / "images" / "train2017",
      dir / "labels" / "train2017",
  )
  convert_coco_keypoints_json_to_yolo_pose(
      dir / "annotations" / "person_keypoints_val2017.json",
      dir / "images" / "val2017",
      dir / "labels" / "val2017",
  )
