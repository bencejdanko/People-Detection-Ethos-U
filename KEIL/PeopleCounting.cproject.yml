        - file: $TP_PATH$/lwIP/src/core/init.c
        - file: $TP_PATH$/lwIP/src/core/def.c
        - file: $TP_PATH$/lwIP/src/core/dns.c
        - file: $TP_PATH$/lwIP/src/core/inet_chksum.c
        - file: $TP_PATH$/lwIP/src/core/ip.c
